<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Self-Manager" />
    <meta name="theme-color" content="#18181B" />

    <!-- Manifest -->
    <link rel="manifest" href="/self-planer/manifest.json" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="152x152" href="/self-planer/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/self-planer/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/self-planer/icons/icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/self-planer/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/self-planer/icons/icon-192.png" />

    <!-- SEO -->
    <title>Self-Manager</title>
    <meta name="description" content="Persönlicher Planer: Aufgaben, Kalender, Routinen, Meetings, Projekte, Review." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      html, body { background: #F9F8F6; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/self-planer/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW error:', err));
        });
      }
    </script>
  </body>
</html>
